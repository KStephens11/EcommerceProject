<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Catalog</title>

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- jQuery CDN -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/style.css" />

</head>
<body>

<nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
  <div class="container-fluid d-flex align-items-center">

    <!-- Brand -->
    <a class="navbar-brand" href="#">Ecommerce Products</a>

    <!-- Center Search -->
    <div class="flex-grow-1 d-flex justify-content-center">
      <form id="searchForm" class="d-flex w-50">
        <label for="searchInput"></label>
        <input id="searchInput" class="form-control me-2" type="search" placeholder="Search">

        <button id="searchButton" class="btn btn-light" type="submit">
          <i class="bi bi-search"></i>
        </button>

      </form>
    </div>

    <!-- Right User + Logout -->
    <div class="d-flex align-items-center gap-3">

      <span id="usernameDisplay" class="text-white fw-semibold">Guest</span>


      <form id="logoutForm" action="/logout" method="post">
        <!-- Logout Button -->
        <button class="btn btn-secondary" type="submit" id="logout">
          Logout
        </button>
      </form>

    </div>

  </div>
</nav>

<main class="container mt-4">

  <div id="error" class="alert alert-danger text-center py-4" style="display:none;"></div>

  <section id="products-section">
    <div class="row" id="products"></div>
  </section>

  <section id="user-section" style="display:none;">
    user management here - admin
  </section>

  <section id="management-section" style="display:none;">
    product management here - admin
  </section>

  <!-- Product Detail Modal -->
  <div class="modal fade" id="productModal" tabindex="-1" aria-labelledby="productModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content" style="padding-top: 40px;">
<!--        <div class="modal-header">-->
<!--          <h5 class="modal-title" id="productModalLabel">Product Details</h5>-->
<!--          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>-->
<!--        </div>-->
        <div class="modal-body" id="modalBody">
          <!-- Content will be injected here by JavaScript -->
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <!-- Optional: Add to Cart button later -->
          <button type="button" class="btn btn-primary">Add to Cart</button>
        </div>
      </div>
    </div>
  </div>

</main>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script type="module" src="js/app.js"></script>

</body>
</html>
