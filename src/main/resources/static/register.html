<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f8f9fa;
      padding: 40px;
    }

    .login-box {
      max-width: 400px;
      margin: auto;
    }
  </style>

</head>

<body>

<div class="login-box card shadow p-4">

  <h3 class="text-center mb-4">Register</h3>

  <form id="registerForm">

    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" class="form-control" id="regUsername" required autofocus>
    </div>

    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" class="form-control" id="regPassword" required>
    </div>

    <button type="submit" class="btn btn-primary w-100">
      Register
    </button>

  </form>

  <!-- Warning Box -->
  <div class="alert alert-warning mt-3 d-none" id="warningBox">
    <strong>Warning:</strong>
    <span id="warningText"></span>
  </div>

  <!-- Back to Login Button -->
  <div class="mt-3">
    <a href="/login" class="btn btn-secondary w-100">
      Back to Login
    </a>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/jquery-4.0.0.min.js"></script>

<script>

  $(document).ready(function(){

    $("#registerForm").on("submit", function(e){
      registerUser(e);
    });

  });

  function registerUser(event) {

    event.preventDefault();

    $("#warningBox").addClass("d-none");

    const user = {
      username: $("#regUsername").val(),
      password: $("#regPassword").val()
    };

    $.ajax({
      url: "/api/users/register",
      type: "POST",
      contentType: "application/json",
      data: JSON.stringify(user),

      success: function () {
        window.location.href = "/login";
      },

      error: function (xhr) {

        let message = "Registration failed";

        try {
          const response = JSON.parse(xhr.responseText);
          message = response.message || message;
        } catch (e) {
          message = xhr.responseText || message;
        }

        $("#warningText").text(message);
        $("#warningBox").removeClass("d-none");

      }
    });
  }
</script>

</body>
</html>
